<script>
document.getElementById('place-order-btn').addEventListener('click', function(e) {
    var form = document.getElementById('drum-builder-form');
    var errorDiv = document.getElementById('form-error-message');
    errorDiv.style.display = 'none';
    errorDiv.textContent = '';

    // Validate required fields (including hidden swatch fields)
    var requiredFields = form.querySelectorAll('[required]');
    var firstInvalid = null;
    requiredFields.forEach(function(field) {
        // For hidden swatch fields, check value
        if (field.offsetParent === null || field.type === 'hidden') {
            if (!field.value) {
                if (!firstInvalid) firstInvalid = field;
                field.classList.add('is-invalid');
            } else {
                field.classList.remove('is-invalid');
            }
        } else if (!field.value) {
            if (!firstInvalid) firstInvalid = field;
            field.classList.add('is-invalid');
        } else {
            field.classList.remove('is-invalid');
        }
    });

    // Remove all drum size validation logic, only required field check remains

    // Validate additional components
    var componentGroups = form.querySelectorAll('.component-group');
    var additionalKickCount = 0;
    for (var i = 0; i < componentGroups.length; i++) {
        var group = componentGroups[i];
        var type = group.querySelector('.component-type').value;
        if (type === 'kick') {
            additionalKickCount++;
        }
        // No drum size validation, only required field check
        if (type === 'rack_tom' || type === 'floor_tom' || type === 'snare' || type === 'pancake' || type === 'gong') {
            var sizeSel = group.querySelector('select[name$="_size[]"]');
            if (sizeSel && !sizeSel.value) {
                e.preventDefault();
                errorDiv.textContent = "Please select a size for all additional components.";
                errorDiv.style.display = '';
                sizeSel.classList.add('is-invalid');
                sizeSel.scrollIntoView({behavior: "smooth", block: "center"});
                return;
            }
        }
    }
    // Only allow one additional kick
    if (additionalKickCount > 1) {
        e.preventDefault();
        errorDiv.textContent = "You can only add one additional kick drum.";
        errorDiv.style.display = '';
        return;
    }

    if (firstInvalid) {
        e.preventDefault();
        errorDiv.textContent = "Please fill out all required fields before placing your order.";
        errorDiv.style.display = '';
        // Scroll to first invalid field
        var scrollTo = firstInvalid;
        // If hidden, scroll to its swatch container
        if (firstInvalid.type === 'hidden') {
            var swatchDiv = firstInvalid.previousElementSibling;
            if (swatchDiv && swatchDiv.classList.contains('d-flex')) {
                scrollTo = swatchDiv;
            }
        }
        scrollTo.scrollIntoView({behavior: "smooth", block: "center"});
        return;
    }

    var isAuthenticated = "{{ user.is_authenticated|yesno:'true,false' }}" === "true";
    if (isAuthenticated) {
        form.submit();
    } else {
        window.location.href = "{% url 'login' %}?next={% url 'drumsbuilder' %}";
    }
});

// Swatch selection logic for finish, hardware color
function setupSwatchSelection(containerId, inputId, imgId, descId) {
    var container = document.getElementById(containerId);
    if (!container) return;
    var input = document.getElementById(inputId);
    var img = imgId ? document.getElementById(imgId) : null;
    var desc = descId ? document.getElementById(descId) : null;
    // Set initial value if already selected (for browser autofill)
    var selected = container.querySelector('.swatch.selected');
    if (selected) {
        input.value = selected.getAttribute('data-value');
        if (img) {
            var imgSrc = selected.getAttribute('data-img');
            if (imgSrc) {
                img.src = imgSrc;
                img.style.display = '';
            } else {
                img.style.display = 'none';
            }
        }
        if (desc) {
            var descText = selected.getAttribute('data-desc');
            desc.textContent = descText ? descText : '';
        }
    }
    container.addEventListener('click', function(e) {
        var swatch = e.target.closest('.swatch');
        if (!swatch) return;
        Array.from(container.getElementsByClassName('swatch')).forEach(function(s) {
            s.classList.remove('selected');
        });
        swatch.classList.add('selected');
        input.value = swatch.getAttribute('data-value');
        if (img) {
            var imgSrc = swatch.getAttribute('data-img');
            if (imgSrc) {
                img.src = imgSrc;
                img.style.display = '';
            } else {
                img.style.display = 'none';
            }
        }
        if (desc) {
            var descText = swatch.getAttribute('data-desc');
            desc.textContent = descText ? descText : '';
        }
    });
}

// Setup swatch selection for Finish, Hardware Color

// Setup previews for dropdowns
function setupSpecPreview(selectName, imgId, descId) {
    var select = document.getElementsByName(selectName)[0];
    var img = imgId ? document.getElementById(imgId) : null;
    var desc = descId ? document.getElementById(descId) : null;
    if (!select) return;
    select.addEventListener('change', function() {
        var opt = select.options[select.selectedIndex];
        var imgSrc = opt.getAttribute('data-img');
        var descText = opt.getAttribute('data-desc');
        if (img && imgSrc) {
            img.src = imgSrc;
            img.style.display = '';
        } else if (img) {
            img.style.display = 'none';
        }
        if (desc) {
            desc.textContent = descText ? descText : '';
        }
    });
}

// Kit preset logic with automatic additional components and auto-switch to custom
(function() {
    var presetSelect = document.getElementById('kit-preset-select');
    var kick = document.getElementById('kick_size_select');
    var rack = document.getElementById('rack_tom_size_select');
    var floor = document.getElementById('floor_tom_size_select');
    var additionalComponents = document.getElementById('additional-components');

    // Helper to select by value
    function selectByValue(select, value) {
        for (var i = 0; i < select.options.length; i++) {
            if (select.options[i].value === value) {
                select.selectedIndex = i;
                select.dispatchEvent(new Event('change'));
                return;
            }
        }
        select.selectedIndex = 0;
        select.dispatchEvent(new Event('change'));
    }

    // Helper to add an additional component and set its value
    function addComponent(type, sizeValue) {
        document.getElementById('add-component-btn').click();
        var groups = additionalComponents.querySelectorAll('.component-group');
        var lastGroup = groups[groups.length - 1];
        var typeSelect = lastGroup.querySelector('.component-type');
        typeSelect.value = type;
        typeSelect.dispatchEvent(new Event('change'));
        if (sizeValue) {
            var sizeSelect = lastGroup.querySelector('select[name$="_size[]"]');
            if (sizeSelect) {
                selectByValue(sizeSelect, sizeValue);
            }
        }
    }

    function clearAdditionalComponents() {
        additionalComponents.innerHTML = '';
    }

    var presets = {
        standard: {
            kick: "22x18", rack: "10x7", floor: "16x16",
            additional: [
                {type: "rack_tom", size: "12x8"}
            ]
        },
        jazz: {
            kick: "18x14", rack: "12x8", floor: "14x14",
            additional: []
        },
        classic_rock: {
            kick: "22x16", rack: "13x9", floor: "16x16",
            additional: []
        },
        gospel: {
            kick: "22x18", rack: "10x7", floor: "16x16",
            additional: [
                {type: "rack_tom", size: "12x8"},
                {type: "rack_tom", size: "13x9"}
            ]
        },
        metal: {
            kick: "22x18", rack: "12x9", floor: "18x16",
            additional: [
                {type: "kick"},
                {type: "rack_tom", size: "10x8"},
                {type: "floor_tom", size: "16x16"}
            ]
        },
        fusion: {
            kick: "22x16", rack: "10x7", floor: "14x14",
            additional: [
                {type: "rack_tom", size: "12x8"},
                {type: "floor_tom", size: "16x16"}

        },
        zep: {
            kick: "24x14", rack: "14x11", floor: "16x16",
            additional: [
                {type: "floor_tom", size: "18x16"}
            ]
        },
        star60s: {
            kick: "20x16", rack: "13x9", floor: "16x16",
            additional: []
        },
        bigband: {
            kick: "22x16", rack: "13x9", floor: "14x14",
            additional: [
                {type: "rack_tom", size: "12x8"},
                {type: "floor_tom", size: "16x16"}
            ]
        },
        modernpop: {
            kick: "20x16", rack: "10x7", floor: "14x14",
            additional: [
                {type: "rack_tom", size: "12x8"}
            ]
        }
    };

    function fallbackKick(size) {
        var allowed = ["18x14","20x16","20x18","22x16","22x18","24x14","24x18"];
        if (allowed.includes(size)) return size;
        if (size === "26x14") return "24x14";
        if (size === "20x14") return "20x16";
        return allowed[0];
    }

    // Track last applied preset and values
    var lastPreset = "custom";
    var lastPresetValues = {};
    var isApplyingPreset = false;

    function applyPreset(val) {
        var preset = presets[val];
        if (!preset) return;
        isApplyingPreset = true;
        selectByValue(kick, fallbackKick(preset.kick));
        selectByValue(rack, preset.rack);
        selectByValue(floor, preset.floor);
        clearAdditionalComponents();
        if (preset.additional && preset.additional.length > 0) {
            preset.additional.forEach(function(comp) {
                if (comp.type === "kick") {
                    addComponent("kick");
                } else {
                    addComponent(comp.type, comp.size);
                }
            });
        }
        updateKickOptionAvailability();
        lastPreset = val;
        lastPresetValues = {
            kick: fallbackKick(preset.kick),
            rack: preset.rack,
            floor: preset.floor,
            additional: (preset.additional || []).map(function(comp) {
                return {type: comp.type, size: comp.size || null};
            })
        };
        // Delay resetting isApplyingPreset to avoid race with change events
        setTimeout(function() { isApplyingPreset = false; }, 0);
    }

    presetSelect.addEventListener('change', function() {
        var val = presetSelect.value;
        if (val === "custom") return;
        applyPreset(val);
    });

    // If user changes any main drum size, set preset to custom if not matching last preset
    [kick, rack, floor].forEach(function(sel, idx) {
        sel.addEventListener('change', function() {
            if (isApplyingPreset) return;
            if (presetSelect.value === "custom") return;
            var mismatch = false;
            if (lastPresetValues.kick && kick.value !== lastPresetValues.kick) mismatch = true;
            if (lastPresetValues.rack && rack.value !== lastPresetValues.rack) mismatch = true;
            if (lastPresetValues.floor && floor.value !== lastPresetValues.floor) mismatch = true;
            if (mismatch) {
                presetSelect.value = "custom";
            }
        });
    });

    // If user changes additional components, set to custom if not matching last preset
    var observer = new MutationObserver(function() {
        if (isApplyingPreset) return;
        if (presetSelect.value === "custom") return;
        var groups = additionalComponents.querySelectorAll('.component-group');
        var current = [];
        groups.forEach(function(group) {
            var type = group.querySelector('.component-type').value;
            var sizeSel = group.querySelector('select[name$="_size[]"]');
            var size = sizeSel ? sizeSel.value : null;
            current.push({type: type, size: size});
        });
        var presetAdd = lastPresetValues.additional || [];
        if (current.length !== presetAdd.length) {
            presetSelect.value = "custom";
            return;
        }
        for (var i = 0; i < current.length; i++) {
            if (current[i].type !== presetAdd[i].type) {
                presetSelect.value = "custom";
                return;
            }
            if (presetAdd[i].size && current[i].size !== presetAdd[i].size) {
                presetSelect.value = "custom";
                return;
            }
        }
    });
    observer.observe(document.getElementById('additional-components'), {childList: true, subtree: true});

    document.getElementById('additional-components').addEventListener('change', function(e) {
        if (isApplyingPreset) return;
        if (presetSelect.value === "custom") return;
        observer.takeRecords();
    });

})();

function updateKickOptionAvailability() {
    // Disable "Kick" option if already present
    var groups = document.querySelectorAll('.component-group');
    var kickCount = 0;
    groups.forEach(function(group) {
        var sel = group.querySelector('.component-type');
        if (sel && sel.value === 'kick') kickCount++;
    });
    // For all dropdowns, disable/enable "Kick" option accordingly
    document.querySelectorAll('.component-type').forEach(function(sel) {
        var kickOpt = sel.querySelector('option[value="kick"]');
        if (kickOpt) {
            if (kickCount >= 1 && sel.value !== 'kick') {
                kickOpt.disabled = true;
            } else {
                kickOpt.disabled = false;
            }
        }
    });
}

    const container = document.getElementById('additional-components');
    const div = document.createElement('div');

    div.querySelector('.component-type').addEventListener('change', function(e) {

                    <option value="18x16">18x16</option>

        } else {

    // Remove component

    // Initial update for kick option
    updateKickOptionAvailability();
});

// --- Pricing Logic ---
const DRUM_BASE_PRICE = 700;
const DRUM_COMPONENT_PRICES = {
    'kick': 250,
    'rack_tom': 120,
    'floor_tom': 150,
    'snare': 180,
    'pancake': 100,
    'rocket_tom': 300,
    'gong': 200
};
const DRUM_FINISH_UPCHARGE = {
    'Candy Apple Red': 50,
    'Blue Burst Fade': 40,
    'Purple Fade': 40,
    'Orange Sparkle': 40,
    'Green Sparkle': 40,
    'Sparkling Blue': 40,
    'Purple Sparkle': 40,
    'Black Pearl': 30,
    'White Pearl': 30,
    'Black Oyster': 30,
    'Blue Oyster': 30
};
const DRUM_HARDWARE_UPCHARGE = {
    'Gold': 80,
    'Black': 40
};

function getDrumSubtotal() {
    let subtotal = DRUM_BASE_PRICE;
    // Finish upcharge
    const finish = document.getElementById('finish_input').value;
    if (DRUM_FINISH_UPCHARGE[finish]) subtotal += DRUM_FINISH_UPCHARGE[finish];
    // Hardware color upcharge
    const hardware = document.getElementById('hardware_color_input').value;
    if (DRUM_HARDWARE_UPCHARGE[hardware]) subtotal += DRUM_HARDWARE_UPCHARGE[hardware];
    // Additional components
    const groups = document.querySelectorAll('.component-group');
    groups.forEach(group => {
        const type = group.querySelector('.component-type').value;
        if (type === 'rocket_tom') {
            subtotal += DRUM_COMPONENT_PRICES['rocket_tom'];
        } else if (DRUM_COMPONENT_PRICES[type]) {
            subtotal += DRUM_COMPONENT_PRICES[type];
        }
    });
    return subtotal;
}

function updateDrumPriceQuote() {
    const subtotal = getDrumSubtotal();
    document.getElementById('price-quote').textContent = `Subtotal: $${subtotal}`;
}

// Update price on all relevant changes
if (document.getElementById('drum-builder-form')) {
    document.getElementById('drum-builder-form').addEventListener('change', updateDrumPriceQuote);
}
if (document.getElementById('additional-components')) {
    document.getElementById('additional-components').addEventListener('DOMSubtreeModified', updateDrumPriceQuote);
}
if (document.getElementById('finish_swatches')) {

}

    });
}

        setTimeout(updateDrumPriceQuote, 100);
    });
}
// Initial price
updateDrumPriceQuote();
