{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-12">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="card-title mb-4 text-center">Design Your Custom Bass</h2>
                    <form method="post" class="mb-4" id="bassbuilder-form">
                        {% csrf_token %}

                        <div class="mb-4 border-bottom pb-3">
                            <label class="form-label fw-bold">Orientation</label>

<script>
document.getElementById('place-order-btn').addEventListener('click', function(e) {
    var isAuthenticated = "{{ user.is_authenticated|yesno:'true,false' }}" === "true";
    if (isAuthenticated) {
        form.submit();
    } else {
        window.location.href = "{% url 'login' %}?next={% url 'bassbuilder' %}";
    }

    var form = document.getElementById('bassbuilder-form');
    var errorDiv = document.getElementById('form-error-message');
    errorDiv.style.display = 'none';
    errorDiv.textContent = '';

    // Validate required fields (including hidden swatch fields)
    var requiredFields = form.querySelectorAll('[required]');
    var firstInvalid = null;
    requiredFields.forEach(function(field) {
        // For hidden swatch fields, check value
        if (field.offsetParent === null || field.type === 'hidden') {
            if (!field.value) {
                if (!firstInvalid) firstInvalid = field;
                field.classList.add('is-invalid');
            } else {
                field.classList.remove('is-invalid');
            }
        } else if (!field.value) {
            if (!firstInvalid) firstInvalid = field;
            field.classList.add('is-invalid');
        } else {
            field.classList.remove('is-invalid');
        }
    });

    if (firstInvalid) {
        e.preventDefault();
        errorDiv.textContent = "Please fill out all required fields before placing your order.";
        errorDiv.style.display = '';
        // Scroll to first invalid field
        var scrollTo = firstInvalid;
        // If hidden, scroll to its swatch container
        if (firstInvalid.type === 'hidden') {
            var swatchDiv = firstInvalid.previousElementSibling;
            if (swatchDiv && swatchDiv.classList.contains('d-flex')) {
                scrollTo = swatchDiv;
            }
        }
        scrollTo.scrollIntoView({behavior: "smooth", block: "center"});
        return;
    }


});
function setupSpecPreview(selectName, imgId, descId) {
    var select = document.getElementsByName(selectName)[0];
    var img = imgId ? document.getElementById(imgId) : null;
    var desc = descId ? document.getElementById(descId) : null;
    if (!select) return;
    select.addEventListener('change', function() {
        var opt = select.options[select.selectedIndex];
        var imgSrc = opt.getAttribute('data-img');
        var descText = opt.getAttribute('data-desc');
        if (img && imgSrc) {
            img.src = imgSrc;
            img.style.display = '';
        } else if (img) {
            img.style.display = 'none';
        }
        if (desc) {
            desc.textContent = descText ? descText : '';
        }
    });
}

// Swatch selection logic for finish, pickguard, hardware color
function setupSwatchSelection(containerId, inputId, imgId, descId) {
    var container = document.getElementById(containerId);
    if (!container) return;
    var input = document.getElementById(inputId);
    var img = imgId ? document.getElementById(imgId) : null;
    var desc = descId ? document.getElementById(descId) : null;
    // Set initial value if already selected (for browser autofill)
    var selected = container.querySelector('.swatch.selected');
    if (selected) {
        input.value = selected.getAttribute('data-value');
        if (img) {
            var imgSrc = selected.getAttribute('data-img');
            if (imgSrc) {
                img.src = imgSrc;
                img.style.display = '';
            } else {
                img.style.display = 'none';
            }
        }
        if (desc) {
            var descText = selected.getAttribute('data-desc');
            desc.textContent = descText ? descText : '';
        }
    }
    container.addEventListener('click', function(e) {
        var swatch = e.target.closest('.swatch');
        if (!swatch) return;
        Array.from(container.getElementsByClassName('swatch')).forEach(function(s) {
            s.classList.remove('selected');
        });
        swatch.classList.add('selected');
        input.value = swatch.getAttribute('data-value');
        if (img) {
            var imgSrc = swatch.getAttribute('data-img');
            if (imgSrc) {
                img.src = imgSrc;
                img.style.display = '';
            } else {
                img.style.display = 'none';
            }
        }
        if (desc) {
            var descText = swatch.getAttribute('data-desc');
            desc.textContent = descText ? descText : '';
        }
    });
}

// --- Pricing Logic ---
const BASS_BASE_PRICE = 500;
const BASS_FINISH_UPCHARGE = {
    'Candy Apple Red': 40,
    'Blue Burst': 30,
    'Cherry Sunburst': 30,
    'Gold': 30,
    'Green Burst': 30,
    'Metallic Purple': 30,
    'Pelham Blue': 30,
    'Purple Burst': 30,
    'Aqua': 20,
    'Pink': 20,
    'Blue Burst': 30,
    'Purple Burst': 30
};
const BASS_HARDWARE_UPCHARGE = {
    'Gold': 60,
    'Black': 30
};
const BASS_PICKGUARD_UPCHARGE = {
    'Pearloid': 25,
    'Tortoise': 20,
    'Black': 10,
    'White': 10
};
const BASS_ADDON_PRICE = 25; // per add-on

function getBassSubtotal() {
    let subtotal = BASS_BASE_PRICE;
    // Finish upcharge
    const finish = document.getElementById('finish_input') ? document.getElementById('finish_input').value : '';
    if (BASS_FINISH_UPCHARGE[finish]) subtotal += BASS_FINISH_UPCHARGE[finish];
    // Hardware color upcharge
    const hardware = document.getElementById('hardware_color_input') ? document.getElementById('hardware_color_input').value : '';
    if (BASS_HARDWARE_UPCHARGE[hardware]) subtotal += BASS_HARDWARE_UPCHARGE[hardware];
    // Pickguard upcharge
    const pickguard = document.getElementById('pickguard_input') ? document.getElementById('pickguard_input').value : '';
    if (BASS_PICKGUARD_UPCHARGE[pickguard]) subtotal += BASS_PICKGUARD_UPCHARGE[pickguard];
    // Add-ons (checkboxes)
    const addonChecks = document.querySelectorAll('input[name="addons"]:checked');
    subtotal += addonChecks.length * BASS_ADDON_PRICE;
    return subtotal;
}

function updateBassPriceQuote() {
    const subtotal = getBassSubtotal();
    document.getElementById('price-quote').textContent = `Subtotal: $${subtotal}`;
}

// Update price on all relevant changes
if (document.getElementById('bassbuilder-form')) {
    document.getElementById('bassbuilder-form').addEventListener('change', updateBassPriceQuote);
}
if (document.getElementById('finish_swatches')) {
    document.getElementById('finish_swatches').addEventListener('click', function(e) {
        setTimeout(updateBassPriceQuote, 10);
    });
}
if (document.getElementById('hardware_color_swatches')) {
    document.getElementById('hardware_color_swatches').addEventListener('click', function(e) {
        setTimeout(updateBassPriceQuote, 10);
    });
}
if (document.getElementById('pickguard_swatches')) {
    document.getElementById('pickguard_swatches').addEventListener('click', function(e) {
        setTimeout(updateBassPriceQuote, 10);
    });
}
// Initial price
updateBassPriceQuote();

// Setup swatch selection for Finish, Pickguard, Hardware Color
setupSwatchSelection('finish_swatches', 'finish_input', 'finish_img', 'finish_desc');
setupSwatchSelection('pickguard_swatches', 'pickguard_input', 'pickguard_img', 'pickguard_desc');
setupSwatchSelection('hardware_color_swatches', 'hardware_color_input', 'hardware_color_img', 'hardware_color_desc');

// Setup previews for dropdowns
setupSpecPreview('body_shape', 'bass_body_shape_img', 'bass_body_shape_desc');
setupSpecPreview('body_wood', '', 'body_wood_desc');
setupSpecPreview('pickup', 'pickup_img', 'pickup_desc');
</script>
