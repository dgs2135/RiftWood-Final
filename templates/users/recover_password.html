{% extends 'base.html' %}
{% block content %}
    <h2>Recover Password</h2>
    <form method="post">
        {% csrf_token %}
        <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>
        <button type="submit" class="btn btn-primary">Recover</button>
    </form>
{% endblock %}
